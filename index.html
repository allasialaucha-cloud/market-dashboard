<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060a0f">
<title>Market Dashboard</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#060a0f;
  --surface:#0c1219;
  --surface2:#111820;
  --border:#1a2535;
  --border2:#243044;
  --text:#dde6f0;
  --muted:#5a7a9a;
  --dim:#2d4060;
  --green:#00e676;
  --green2:#00c853;
  --red:#ff3d5a;
  --red2:#c62828;
  --yellow:#ffd600;
  --blue:#40c4ff;
  --orange:#ff9100;
  --mono:'Share Tech Mono',monospace;
  --head:'Barlow Condensed',sans-serif;
  --display:'Oswald',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
body{display:flex;flex-direction:column;font-family:var(--head);}

/* ── TICKER STRIP ── */
#strip{
  height:36px;background:var(--surface);border-bottom:1px solid var(--border2);
  display:flex;align-items:center;overflow:hidden;position:relative;flex-shrink:0;
}
#strip::before,#strip::after{
  content:'';position:absolute;top:0;bottom:0;width:60px;z-index:2;
}
#strip::before{left:0;background:linear-gradient(90deg,var(--surface),transparent);}
#strip::after{right:0;background:linear-gradient(-90deg,var(--surface),transparent);}
.strip-label{
  flex-shrink:0;padding:0 16px;font-size:10px;letter-spacing:2px;
  text-transform:uppercase;color:var(--blue);font-weight:600;font-family:var(--head);
  border-right:1px solid var(--border2);
}
.strip-track{
  display:flex;align-items:center;gap:0;overflow:hidden;flex:1;
}
.strip-inner{
  display:flex;align-items:center;gap:32px;padding:0 32px;
  animation:scroll-left 30s linear infinite;
  white-space:nowrap;
}
@keyframes scroll-left{
  0%{transform:translateX(0);}
  100%{transform:translateX(-50%);}
}
.strip-item{
  display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;
}
.strip-sym{color:var(--text);font-weight:400;letter-spacing:1px;}
.strip-price{color:var(--text);}
.strip-chg.up{color:var(--green);}
.strip-chg.down{color:var(--red);}
.strip-chg.flat{color:var(--muted);}

/* ── MAIN AREA ── */
#main{flex:1;display:flex;overflow:hidden;gap:1px;background:var(--border);}

/* ── LEFT: NEWS ── */
#news-panel{
  width:38%;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;
}
.panel-header{
  padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border2);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.panel-label{
  font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:600;
}
.live-badge{
  font-size:9px;padding:2px 7px;background:var(--red2);color:#fff;
  letter-spacing:1.5px;text-transform:uppercase;font-weight:700;
  animation:blink-badge 1.5s infinite;
}
@keyframes blink-badge{0%,100%{opacity:1;}50%{opacity:.5;}}
#news-content{flex:1;display:flex;flex-direction:column;padding:20px 18px;overflow:hidden;}
.news-source{
  font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--blue);
  margin-bottom:10px;font-weight:600;display:flex;align-items:center;gap:8px;
}
.news-source-logo{
  width:18px;height:18px;border-radius:3px;object-fit:contain;
  background:var(--surface2);flex-shrink:0;
}
.ticker-logo{
  width:20px;height:20px;border-radius:50%;object-fit:contain;
  background:var(--surface2);flex-shrink:0;border:1px solid var(--border);
}
.idx-logo,.port-logo{
  width:22px;height:22px;border-radius:50%;object-fit:contain;
  background:var(--surface2);border:1px solid var(--border);flex-shrink:0;
}
.news-headline{
  font-family:var(--display);font-size:clamp(18px,3vw,30px);font-weight:600;
  line-height:1.2;color:var(--text);margin-bottom:16px;
}
.news-body{
  font-size:13px;line-height:1.7;color:var(--muted);flex:1;overflow:hidden;
  font-family:var(--head);font-weight:300;
}
.news-meta{
  margin-top:12px;font-size:10px;color:var(--dim);letter-spacing:1px;
  font-family:var(--mono);border-top:1px solid var(--border);padding-top:10px;
}
.news-nav{
  display:flex;gap:6px;padding:12px 18px;border-top:1px solid var(--border);background:var(--surface);
}
.news-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);cursor:pointer;transition:background .3s;}
.news-dot.active{background:var(--blue);}

/* ── RIGHT PANEL ── */
#right-panel{flex:1;display:flex;flex-direction:column;gap:1px;background:var(--border);}

/* ── INDICES ── */
#indices-panel{
  flex:1;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;
}
.indices-grid{
  flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);overflow:hidden;
}
.idx-card{
  background:var(--surface);padding:12px 14px;display:flex;flex-direction:column;justify-content:space-between;
  position:relative;overflow:hidden;
}
.idx-card-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.idx-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
}
.idx-card.up::after{background:var(--green2);}
.idx-card.down::after{background:var(--red2);}
.idx-sym{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:4px;}
.idx-name{font-size:9px;color:var(--dim);letter-spacing:.5px;margin-bottom:8px;}
.idx-price{font-family:var(--mono);font-size:16px;color:var(--text);margin-bottom:3px;}
.idx-chg{font-family:var(--mono);font-size:12px;}
.idx-chg.up{color:var(--green);}
.idx-chg.down{color:var(--red);}

/* ── PORTFOLIO ── */
#portfolio-panel{
  flex:1;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;
}
.portfolio-grid{
  flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);
  grid-auto-rows:1fr;
}
.port-card{
  background:var(--surface2);padding:10px 12px;display:flex;flex-direction:column;
  justify-content:space-between;cursor:default;transition:background .15s;
}
.port-card:hover{background:#151e2a;}
.port-card-top{display:flex;align-items:center;gap:7px;margin-bottom:2px;}
.port-sym{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:2px;}
.port-sym.up{color:var(--green);}
.port-sym.down{color:var(--red);}
.port-name{font-size:9px;color:var(--dim);margin-bottom:6px;}
.port-price{font-family:var(--mono);font-size:15px;color:var(--text);}
.port-chg{font-family:var(--mono);font-size:11px;margin-top:2px;}
.port-chg.up{color:var(--green);}
.port-chg.down{color:var(--red);}
.port-bar{height:2px;border-radius:1px;margin-top:6px;background:var(--border);}
.port-bar-fill{height:100%;border-radius:1px;transition:width 1s;}
.port-bar-fill.up{background:var(--green2);}
.port-bar-fill.down{background:var(--red2);}

/* ── BTC MINI ── */
#btc-mini{
  position:absolute;top:44px;right:0;width:160px;
  background:var(--surface);border-left:1px solid var(--border2);border-bottom:1px solid var(--border2);
  padding:10px 12px;z-index:10;
}
.btc-header{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.btc-icon{font-size:12px;color:var(--orange);}
.btc-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--orange);font-weight:600;}
.btc-price{font-family:var(--mono);font-size:16px;color:var(--text);margin-bottom:2px;}
.btc-chg{font-family:var(--mono);font-size:11px;}
.btc-chg.up{color:var(--green);}
.btc-chg.down{color:var(--red);}
.btc-sparkline{margin-top:6px;}

/* ── SOCALO / FOOTER ── */
#socalo{
  height:44px;background:var(--surface);border-top:1px solid var(--border2);
  display:flex;align-items:center;padding:0 20px;gap:0;flex-shrink:0;
}
.soc-block{
  display:flex;align-items:center;gap:10px;padding:0 20px;
  border-right:1px solid var(--border2);height:100%;
}
.soc-block:last-child{border-right:none;}
.soc-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);font-weight:600;}
.soc-value{font-family:var(--mono);font-size:14px;color:var(--text);}
.soc-value.up{color:var(--green);}
.soc-value.down{color:var(--red);}
.soc-value.yellow{color:var(--yellow);}
.clock-val{font-family:var(--mono);font-size:18px;color:var(--text);letter-spacing:2px;}
.clock-date{font-size:10px;color:var(--muted);letter-spacing:1px;font-family:var(--head);}
.weather-icon{font-size:18px;}
.spacer{flex:1;}

/* ── TICKER SEARCH MODAL ── */
#search-modal{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.75);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
}
#search-modal.open{display:flex;}
.modal-box{
  background:var(--surface);border:1px solid var(--border2);border-radius:16px;
  width:min(520px,95vw);max-height:80vh;display:flex;flex-direction:column;overflow:hidden;
}
.modal-header{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.modal-title{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:600;}
.modal-close{
  background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;
  line-height:1;padding:0 4px;transition:color .15s;
}
.modal-close:hover{color:var(--text);}
.modal-search-wrap{padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
.modal-input{
  width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-family:var(--mono);font-size:14px;padding:10px 14px;
  outline:none;transition:border-color .15s;letter-spacing:1px;
}
.modal-input:focus{border-color:var(--blue);}
.modal-input::placeholder{color:var(--dim);letter-spacing:0;}
.modal-results{flex:1;overflow-y:auto;padding:8px 0;}
.modal-section-label{
  padding:8px 20px 4px;font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--dim);font-weight:700;
}
.modal-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;cursor:pointer;transition:background .1s;gap:12px;
}
.modal-item:hover{background:var(--surface2);}
.modal-item-left{display:flex;align-items:center;gap:10px;}
.modal-sym{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--text);min-width:52px;}
.modal-name{font-size:11px;color:var(--muted);}
.modal-tags{display:flex;gap:6px;}
.modal-tag{
  font-size:9px;padding:3px 8px;border-radius:4px;letter-spacing:1px;
  font-weight:600;text-transform:uppercase;cursor:pointer;transition:all .15s;border:1px solid transparent;
}
.modal-tag.portfolio{background:rgba(0,230,118,.1);color:var(--green);border-color:rgba(0,230,118,.3);}
.modal-tag.portfolio.active{background:rgba(0,230,118,.25);border-color:var(--green);}
.modal-tag.watchlist{background:rgba(64,196,255,.1);color:var(--blue);border-color:rgba(64,196,255,.3);}
.modal-tag.watchlist.active{background:rgba(64,196,255,.25);border-color:var(--blue);}
.modal-tag:hover{filter:brightness(1.2);}
/* edit buttons on panel headers */
.edit-btn{
  font-size:9px;padding:3px 9px;border-radius:4px;letter-spacing:1.5px;font-weight:600;
  text-transform:uppercase;cursor:pointer;background:none;
  border:1px solid var(--border2);color:var(--muted);transition:all .15s;font-family:var(--head);
}
.edit-btn:hover{border-color:var(--blue);color:var(--blue);}
/* strip edit button */
.strip-edit{
  flex-shrink:0;padding:0 12px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--dim);cursor:pointer;border-left:1px solid var(--border2);transition:color .15s;
  font-weight:600;background:none;border-top:none;border-right:none;border-bottom:none;font-family:var(--head);
}
.strip-edit:hover{color:var(--blue);}
.shimmer{
  color:var(--dim);
  animation:shimmer .8s infinite;
}
@keyframes shimmer{0%,100%{opacity:.3;}50%{opacity:.8;}}

/* ── TIMEFRAME BUTTONS ── */
.tf-bar{display:flex;align-items:center;gap:4px;}
.tf-btn{
  font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:4px;
  border:1px solid var(--border2);color:var(--muted);background:none;cursor:pointer;
  transition:all .15s;letter-spacing:.5px;
}
.tf-btn:hover{border-color:var(--blue);color:var(--blue);}
.tf-btn.active{background:var(--blue);border-color:var(--blue);color:#000;font-weight:700;}
.tf-spinner{font-family:var(--mono);font-size:9px;color:var(--dim);margin-left:4px;display:none;}
.tf-spinner.show{display:inline;}
/* ── FORECAST ── */
.wx-forecast{display:flex;align-items:center;gap:0;border-left:1px solid var(--border2);}
.wx-day{display:flex;flex-direction:column;align-items:center;padding:0 9px;border-right:1px solid var(--border2);gap:1px;}
.wx-day-name{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);font-weight:600;}
.wx-day-icon{font-size:13px;line-height:1.2;}
.wx-day-temps{font-family:var(--mono);font-size:10px;color:var(--muted);}
.wx-day-temps b{color:var(--text);font-weight:400;}
.wx-day-precip{font-family:var(--mono);font-size:9px;color:var(--blue);letter-spacing:0;}
/* ── LANDSCAPE MOBILE ── */
@media (max-height: 500px) and (orientation: landscape) {
  /* Strip más compacto */
  #strip { height: 26px; }
  .strip-inner { gap: 20px; padding: 0 20px; }
  .strip-item { font-size: 10px; gap: 5px; }
  .ticker-logo { width: 14px; height: 14px; }

  /* Zócalo más fino */
  #socalo { height: 32px; }
  .clock-val { font-size: 13px; letter-spacing: 1px; }
  .clock-date { font-size: 8px; }
  .soc-label { font-size: 7px; }
  .soc-value { font-size: 11px; }
  .weather-icon { font-size: 13px; }
  .soc-block { padding: 0 10px; gap: 6px; }
  .wx-forecast { gap: 0; }
  .wx-day { padding: 0 6px; }
  .wx-day-name { font-size: 7px; }
  .wx-day-icon { font-size: 10px; }
  .wx-day-temps { font-size: 8px; }
  .wx-day-precip { font-size: 7px; }

  /* Panel headers más finos */
  .panel-header { padding: 5px 10px; }
  .panel-label { font-size: 8px; letter-spacing: 2px; }
  .edit-btn { font-size: 7px; padding: 2px 6px; }
  .tf-btn { font-size: 8px; padding: 2px 5px; }
  .live-badge { font-size: 7px; padding: 1px 5px; }

  /* Noticias más compactas */
  #news-content { padding: 8px 12px; }
  .news-source { font-size: 8px; margin-bottom: 4px; }
  .news-source-logo { width: 12px; height: 12px; }
  .news-headline { font-size: clamp(13px, 2.5vw, 18px); margin-bottom: 6px; line-height: 1.15; }
  .news-body { font-size: 10px; line-height: 1.4; }
  .news-meta { margin-top: 4px; padding-top: 4px; font-size: 8px; }
  .news-nav { padding: 5px 12px; }
  .news-dot { width: 5px; height: 5px; }

  /* Índices: 4 columnas, 2 filas comprimidas */
  .indices-grid { grid-template-columns: repeat(4, 1fr); }
  .idx-card { padding: 6px 8px; }
  .idx-card-top { gap: 4px; margin-bottom: 2px; }
  .idx-sym { font-size: 9px; margin-bottom: 1px; }
  .idx-name { font-size: 7px; margin-bottom: 3px; }
  .idx-price { font-size: 12px; margin-bottom: 1px; }
  .idx-chg { font-size: 9px; }
  .idx-logo { width: 14px; height: 14px; }

  /* Cartera: 4 columnas, 2 filas comprimidas */
  .portfolio-grid { grid-template-columns: repeat(4, 1fr); }
  .port-card { padding: 5px 8px; }
  .port-card-top { gap: 4px; margin-bottom: 1px; }
  .port-sym { font-size: 9px; margin-bottom: 1px; letter-spacing: 1px; }
  .port-name { font-size: 7px; margin-bottom: 2px; }
  .port-price { font-size: 11px; }
  .port-chg { font-size: 8px; margin-top: 1px; }
  .port-bar { margin-top: 3px; height: 1px; }
  .port-logo { width: 14px; height: 14px; }

  /* BTC mini más pequeño */
  #btc-mini { width: 120px; padding: 6px 8px; }
  .btc-label { font-size: 7px; }
  .btc-price { font-size: 12px; }
  .btc-chg { font-size: 9px; }
  #btc-canvas { width: 104px; height: 26px; }
}

.fade-out{animation:fadeOut .3s forwards;}
.fade-in{animation:fadeIn .4s forwards;}
@keyframes fadeOut{to{opacity:0;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>

<!-- TICKER STRIP -->
<div id="strip">
  <div class="strip-label">En seguimiento</div>
  <div class="strip-track">
    <div class="strip-inner" id="strip-inner"></div>
  </div>
  <button class="strip-edit" onclick="openModal()">+ Editar</button>
</div>

<!-- BTC MINI (absolute overlay top right) -->
<div id="btc-mini">
  <div class="btc-header">
    <span class="btc-icon">₿</span>
    <span class="btc-label">BTC · 24h</span>
  </div>
  <div class="btc-price shimmer" id="btc-price">···</div>
  <div class="btc-chg flat" id="btc-chg">···</div>
  <div class="btc-sparkline">
    <canvas id="btc-canvas" width="136" height="36"></canvas>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- NEWS PANEL -->
  <div id="news-panel">
    <div class="panel-header">
      <span class="panel-label">Últimas noticias</span>
      <span class="live-badge">En vivo</span>
    </div>
    <div id="news-content">
      <div class="news-source" id="n-source">Cargando...</div>
      <div class="news-headline" id="n-headline">Obteniendo noticias del mercado...</div>
      <div class="news-body" id="n-body">Por favor espera un momento.</div>
      <div class="news-meta" id="n-meta"></div>
    </div>
    <div class="news-nav" id="news-nav"></div>
  </div>

  <!-- RIGHT -->
  <div id="right-panel">

    <!-- INDICES -->
    <div id="indices-panel">
      <div class="panel-header">
        <span class="panel-label">Índices mundiales</span>
        <button class="edit-btn" onclick="openModal()">+ Editar</button>
      </div>
      <div class="indices-grid" id="indices-grid">
        <!-- JS populated -->
      </div>
    </div>

    <!-- PORTFOLIO -->
    <div id="portfolio-panel">
      <div class="panel-header">
        <span class="panel-label">Mi cartera</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="tf-bar">
            <button class="tf-btn active" onclick="setTimeframe('1D',this)">1D</button>
            <button class="tf-btn" onclick="setTimeframe('1W',this)">1S</button>
            <button class="tf-btn" onclick="setTimeframe('1M',this)">1M</button>
            <button class="tf-btn" onclick="setTimeframe('1Y',this)">1A</button>
            <button class="tf-btn" onclick="setTimeframe('5Y',this)">5A</button>
          </div>
          <span class="tf-spinner" id="tf-spinner">···</span>
          <button class="edit-btn" onclick="openModal()">+ Editar</button>
        </div>
      </div>
      <div class="portfolio-grid" id="portfolio-grid"></div>
    </div>

  </div>
</div>

<!-- SOCALO -->
<div id="socalo">
  <div class="soc-block">
    <div>
      <div class="clock-val" id="clock">--:--:--</div>
      <div class="clock-date" id="clock-date">--</div>
    </div>
  </div>
  <div class="soc-block" style="padding-right:0;border-right:none;">
    <span class="weather-icon" id="wx-icon">--</span>
    <div>
      <div class="soc-label">Hoy</div>
      <div class="soc-value" id="wx-val">··· °C</div>
    </div>
    <div style="margin-left:4px;">
      <div class="soc-value" id="wx-desc" style="font-size:10px;color:var(--muted);font-family:var(--head);max-width:120px;"></div>
    </div>
    <div class="wx-forecast" id="wx-forecast"></div>
  </div>
  <div class="soc-block">
    <div>
      <div class="soc-label">USD BLUE</div>

function timeAgo(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr);
  if(isNaN(d)) return '';
  const diff = Math.floor((Date.now() - d) / 60000);
  if(diff < 1) return 'Ahora mismo';
  if(diff < 60) return `Hace ${diff} min`;
  if(diff < 1440) return `Hace ${Math.floor(diff/60)}h`;
  return `Hace ${Math.floor(diff/1440)} días`;
}
function stripHtml(html){
  const t = document.createElement('div');
  t.innerHTML = html;
  return (t.textContent || t.innerText || '').replace(/\s+/g,' ').trim();
}
function parseRSS(xmlStr){
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlStr, 'text/xml');
  const items = Array.from(doc.querySelectorAll('item')).slice(0,3);
  return items.map(item => ({
    title: item.querySelector('title')?.textContent || '',
    description: item.querySelector('description')?.textContent || '',
    link: item.querySelector('link')?.textContent || item.querySelector('guid')?.textContent || '#',
    pubDate: item.querySelector('pubDate')?.textContent || '',
  }));
}
async function fetchNewsFromFeed(feed){
  try {
    const r = await fetch(CORS + encodeURIComponent(feed.url));
    const d = await r.json();
    if(!d.contents) return [];
    const items = parseRSS(d.contents);
    if(!items.length) return [];
    return items.map(item => ({
      src: feed.name,
      domain: feed.domain,
      headline: stripHtml(item.title).slice(0,120),
      body: stripHtml(item.description).slice(0,320) + '...',
      time: timeAgo(item.pubDate),
      link: item.link || '#',
    }));
  } catch(e){ return []; }
}

}

async function fetchOneYahoo(sym){
  try {
    const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?range=5d&interval=1d`);
    const d = await r.json();
    const quotes = d?.chart?.result?.[0];
    if(!quotes) return null;
    const closes = quotes.indicators?.quote?.[0]?.close?.filter(v=>v!=null);
    if(!closes || closes.length < 2) return null;
    const prev = closes[closes.length - 2];
    const last = closes[closes.length - 1];
    return { price: last, change: ((last - prev) / prev) * 100 };
  } catch(e){ return null; }
}

async function fetchOneFinnhub(sym){
  if(YF_ONLY_SYMS.has(sym)) return fetchOneYahoo(sym);
  const s = fhSym(sym);
  const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${s}&token=${FINNHUB_KEY}`);
  const d = await r.json();
  if(!d || d.c === 0) return null;
  return { price: d.c, change: d.dp };
}

async function fetchYF(symbols){
  // Fetch all in parallel — Finnhub free plan allows 60 req/min, we have ~17 symbols

}

// ── DRAW SPARKLINE ───────────────────────────────────────────
function drawSpark(canvas, data, color){
  if(!data.length) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  const mn = Math.min(...data), mx = Math.max(...data);
  const range = mx - mn || 1;
  const pts = data.map((v,i) => [i/(data.length-1)*W, H - ((v-mn)/range)*(H-4)-2]);
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  pts.slice(1).forEach(p => ctx.lineTo(p[0], p[1]));
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // area fill
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fillStyle = color.replace(')',',0.1)').replace('rgb','rgba');
  ctx.fill();
}

// ── TIMEFRAME LOGIC ───────────────────────────────────────────
let currentTF = '1D';
const TF_CONFIG = {
  '1D': { range:'1d',  interval:'5m'  },
  '1W': { range:'5d',  interval:'60m' },
  '1M': { range:'1mo', interval:'1d'  },
  '1Y': { range:'1y',  interval:'1wk' },
  '5Y': { range:'5y',  interval:'1mo' },
};

async function fetchHistorical(sym){
  const cfg = TF_CONFIG[currentTF];
  try {
    const r = await fetch(
      `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?range=${cfg.range}&interval=${cfg.interval}&includePrePost=false`
    );
    const d = await r.json();
    const quotes = d?.chart?.result?.[0];
    if(!quotes) return null;
    const closes = quotes.indicators?.quote?.[0]?.close || [];
    const valid = closes.filter(v => v != null);
    if(valid.length < 2) return null;
    const first = valid[0];
    const last = valid[valid.length - 1];
    const chg = ((last - first) / first) * 100;
    return { price: last, change: chg };
  } catch(e){ return null; }
}

async function setTimeframe(tf, btn){
  if(tf === currentTF) return;
  currentTF = tf;
  // update button styles
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if(tf === '1D'){
    // 1D: use live Finnhub prices already fetched
    const spinner = document.getElementById('tf-spinner');
    spinner.classList.remove('show');
    const syms = PORTFOLIO.map(p=>p.sym);
    const data = await fetchYF(syms);
    updatePortfolio(data);
    return;
  }

  const spinner = document.getElementById('tf-spinner');
  spinner.textContent = '···';
  spinner.classList.add('show');

  const results = await Promise.allSettled(PORTFOLIO.map(p => fetchHistorical(p.sym)));
  const data = {};
  PORTFOLIO.forEach((p, i) => {
    if(results[i].status === 'fulfilled' && results[i].value){
      data[p.sym] = results[i].value;
    }
  });
  updatePortfolio(data);
  spinner.classList.remove('show');
}

function isInPortfolio(sym){ return PORTFOLIO.some(p=>p.sym===sym); }
function isInWatchlist(sym){ return WATCHLIST.some(w=>w.sym===sym); }

function togglePortfolio(sym, name){
  const idx = PORTFOLIO.findIndex(p=>p.sym===sym);
  if(idx>=0){ PORTFOLIO.splice(idx,1); }
  else { PORTFOLIO.push({sym,name}); }
  renderCard('portfolio-grid', PORTFOLIO, 'portfolio');
  // fetch price for new symbol
  fetchYF(PORTFOLIO.map(p=>p.sym)).then(d=>updatePortfolio(d));
  renderModalResults(document.getElementById('modal-input').value);
}

function toggleWatchlist(sym, name){
  const idx = WATCHLIST.findIndex(w=>w.sym===sym);
  if(idx>=0){ WATCHLIST.splice(idx,1); }
  else { WATCHLIST.push({sym,name}); }
  renderStrip({});
  fetchYF(WATCHLIST.map(w=>w.sym)).then(d=>renderStrip(d));
  renderModalResults(document.getElementById('modal-input').value);
}

function renderModalResults(query){
  const q = (query||'').trim().toUpperCase();
  const el = document.getElementById('modal-results');

  // Build list: query matches first, then current members, then rest
  let filtered;
  if(q.length === 0){
    // Show current portfolio + watchlist + top picks
    const inUse = new Set([...PORTFOLIO.map(p=>p.sym), ...WATCHLIST.map(w=>w.sym)]);
    const inUseItems = TICKER_DB.filter(t=>inUse.has(t.sym));
    const suggestions = TICKER_DB.filter(t=>!inUse.has(t.sym)).slice(0,12);
    filtered = [...inUseItems, ...suggestions];
  } else {
    // Also allow custom symbols not in DB
    const dbMatches = TICKER_DB.filter(t=>
      t.sym.includes(q) || t.name.toUpperCase().includes(q)
    ).slice(0, 20);
    // If typed symbol not in DB, add it as custom entry
    const inDB = TICKER_DB.some(t=>t.sym===q);
    if(q.length>=1 && !inDB && q.match(/^[A-Z0-9.]+$/)){
      dbMatches.unshift({sym:q, name:'Símbolo personalizado'});
    }
    filtered = dbMatches;
  }

  if(!filtered.length){
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--dim);font-size:12px;">Sin resultados</div>';
    return;
  }

  const inPortfolio = PORTFOLIO.map(p=>p.sym);
  const inWatch = WATCHLIST.map(w=>w.sym);

  // Group: active first
  const active = filtered.filter(t=>inPortfolio.includes(t.sym)||inWatch.includes(t.sym));
  const rest = filtered.filter(t=>!inPortfolio.includes(t.sym)&&!inWatch.includes(t.sym));

  let html = '';
  if(active.length){
    html += `<div class="modal-section-label">En uso</div>`;
    html += active.map(t=>modalItemHTML(t, inPortfolio.includes(t.sym), inWatch.includes(t.sym))).join('');
  }
  if(rest.length){
    html += `<div class="modal-section-label">${q ? 'Resultados' : 'Sugeridos'}</div>`;
    html += rest.map(t=>modalItemHTML(t, false, false)).join('');
  }
  el.innerHTML = html;
}

function modalItemHTML(t, inPort, inWatch){
  const logo = STOCK_DOMAINS[t.sym]
    ? `<img class="ticker-logo" src="https://logo.clearbit.com/${STOCK_DOMAINS[t.sym]}" onerror="this.style.display='none'" alt="">`
    : `<div style="width:20px;height:20px;border-radius:50%;background:var(--border2);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--dim);flex-shrink:0;">${t.sym[0]}</div>`;
  return `<div class="modal-item">
    <div class="modal-item-left">
      ${logo}
      <div>
        <div class="modal-sym">${t.sym}</div>
        <div class="modal-name">${t.name}</div>
      </div>
    </div>
    <div class="modal-tags">
      <span class="modal-tag portfolio ${inPort?'active':''}"
        onclick="togglePortfolio('${t.sym}','${t.name.replace(/'/g,'\\\'')}')"
        title="${inPort?'Quitar de cartera':'Agregar a cartera'}">
        ${inPort?'✓ Cartera':'+ Cartera'}
      </span>
      <span class="modal-tag watchlist ${inWatch?'active':''}"
        onclick="toggleWatchlist('${t.sym}','${t.name.replace(/'/g,'\\\'')}')"
        title="${inWatch?'Quitar de seguimiento':'Agregar a seguimiento'}">
        ${inWatch?'✓ Seguim.':'+ Seguim.'}
      </span>
    </div>
  </div>`;
}
